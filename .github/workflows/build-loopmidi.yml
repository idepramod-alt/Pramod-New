name: Build Pramod Octapad Loop MIDI APK

on:
  push:
    branches: [ main ]
    paths:
      - 'gradle_build/**'
      - '.github/workflows/build-loopmidi.yml'
  workflow_dispatch:    # Manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Debug APK (gradle_build)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 (required for AGP 9.x) ─────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK (compileSdk 34) ────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ── 4. Create Gradle wrapper (AGP 9.0 needs Gradle 8.11+) ─────────────
      # Gradle 9.x requires a settings file even for an empty project,
      # so we create one before running 'gradle wrapper' in the temp dir.
      - name: Create Gradle wrapper
        run: |
          mkdir -p /tmp/gradle-init
          echo 'rootProject.name = "tmp"' > /tmp/gradle-init/settings.gradle
          cd /tmp/gradle-init
          gradle wrapper --gradle-version 8.11.1 --distribution-type all
          cp -r gradle gradlew gradlew.bat $GITHUB_WORKSPACE/gradle_build/
          chmod +x $GITHUB_WORKSPACE/gradle_build/gradlew

      # ── 5. Cache Gradle files ──────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-loopmidi-${{ hashFiles('gradle_build/**/*.gradle*', 'gradle_build/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-loopmidi-

      # ── 6. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: gradle_build
        run: |
          set -o pipefail
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee /tmp/build_debug.log

      # ── 7. Show logs on failure ────────────────────────────────────────────
      - name: Show build log on failure
        if: failure()
        run: tail -n 400 /tmp/build_debug.log || true

      # ── 8. Collect APK ────────────────────────────────────────────────────
      - name: Rename APK
        if: success()
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          SRC="gradle_build/app/build/outputs/apk/debug/app-debug.apk"
          mkdir -p artifacts
          cp "$SRC" "artifacts/PramodOctapad-v1.0-debug-${SHORT}.apk"
          echo "=== Built APK ===" && ls -lh artifacts/

      # ── 9. Upload APK artifact ────────────────────────────────────────────
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PramodOctapad-Debug-APK
          path: artifacts/PramodOctapad-v1.0-debug-*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 10. Build summary ─────────────────────────────────────────────────
      - name: Print build summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
