name: Build Sound Studio APK

on:
  push:
    branches: [ main ]
    paths:
      - 'sound-recorder/**'
      - '.github/workflows/build-sound-studio.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        working-directory: sound-recorder
        run: gradle wrapper --gradle-version 8.9

      - name: Build Debug APK
        working-directory: sound-recorder
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/soundstudio_build.log

      - name: Show build errors if any
        if: always()
        run: |
          if [ -f /tmp/soundstudio_build.log ]; then
            echo "===== Last 200 lines of build log ====="
            tail -n 200 /tmp/soundstudio_build.log
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sound-studio-debug-apk
          path: sound-recorder/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
