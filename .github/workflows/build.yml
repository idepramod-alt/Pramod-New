          import sys, re
          with open(sys.argv[1]) as f:
              src = f.read()
          # The recording patch (step 3) inserts rec_fields immediately after
          # "float feedBuf[SCRATCH_SIZE];" via str.replace. rec_fields ends with
          # a new empty AudioEngineImpl() ctor. readBuf declaration that was
          # originally just after feedBuf is now sandwiched between the two ctors:
          #   AudioEngineImpl() : recActiveTrack(-1), recRunning(false) {}  <- empty dup
          #   float readBuf[SCRATCH_SIZE];                                  <- misplaced
          #   <blank line>
          #   AudioEngineImpl() {                                           <- real ctor
          # Fix: remove the empty dup ctor line, keep everything in between
          # (readBuf + blank line), and add the initializer list to the real ctor.
          pat = re.compile(
              r'    AudioEngineImpl\(\) : recActiveTrack\(-1\), recRunning\(false\) \{\}\n'
              r'(.*?)'
              r'    AudioEngineImpl\(\) \{',
