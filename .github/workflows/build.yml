name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Rewrite root build.gradle
        working-directory: gradle_build
        run: |
          cat > build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.6.0' apply false
              id 'com.google.gms.google-services' version '4.4.2' apply false
          }
          GRADLE

      - name: Rewrite app/build.gradle
        working-directory: gradle_build
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'com.google.gms.google-services'
          }
          android {
              namespace 'com.pramod.loopmidi'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.pramod.loopmidi'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  debug { minifyEnabled false }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              sourceSets {
                  main {
                      jniLibs.srcDirs = ['src/main/jniLibs']
                  }
              }
              packagingOptions {
                  resources {
                      excludes += ['META-INF/DEPENDENCIES','META-INF/LICENSE','META-INF/NOTICE','META-INF/*.kotlin_module','META-INF/*.version','**/*.kotlin_builtins','**/*.kotlin_metadata']
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.documentfile:documentfile:1.1.0'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.legacy:legacy-support-v4:1.0.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.google.firebase:firebase-database:20.3.1'
              implementation 'com.google.firebase:firebase-auth:22.3.1'
              implementation 'com.google.android.gms:play-services-base:18.3.0'
              implementation 'com.google.android.gms:play-services-tasks:18.1.0'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.25'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          GRADLE

      - name: Rewrite settings.gradle
        working-directory: gradle_build
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'PramodLoopMidi'
          include ':app'
          GRADLE

      - name: Create google-services.json
        working-directory: gradle_build/app
        run: |
          cat > google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "pramod-placeholder",
              "storage_bucket": "pramod-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.pramod.loopmidi"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Remove .dex and binary files
        run: |
          rm -f gradle_build/app/src/main/classes*.dex
          rm -f gradle_build/app/src/main/DebugProbesKt.bin

      - name: Remove system resource folders from decompilation
        run: |
          rm -rf gradle_build/app/src/main/res/values-v31
          rm -rf gradle_build/app/src/main/res/color-v31
          rm -rf gradle_build/app/src/main/res/values-anydpi
          rm -rf gradle_build/app/src/main/res/values-anydpi-v24

      - name: Fix native libs folder (lib -> jniLibs)
        run: |
          mkdir -p gradle_build/app/src/main/jniLibs
          cp -r gradle_build/app/src/main/lib/* gradle_build/app/src/main/jniLibs/ 2>/dev/null || true
          rm -rf gradle_build/app/src/main/lib

      - name: Remove binary kotlin metadata from src/main/kotlin
        run: |
          rm -rf gradle_build/app/src/main/kotlin

      - name: Remove META-INF from src/main
        run: |
          rm -rf gradle_build/app/src/main/META-INF

      - name: Fix AndroidManifest.xml
        run: |
          sed -i 's/package="com.pramod.loopmidi"[[:space:]]*//' gradle_build/app/src/main/AndroidManifest.xml
          sed -i '/android:extractNativeLibs/d' gradle_build/app/src/main/AndroidManifest.xml

      - name: Copy Java sources from decompiled
        run: |
          mkdir -p gradle_build/app/src/main/java/com/pramod/loopmidi
          find decompiled_apk_jadx/sources/com/pramod/loopmidi -name "*.java" ! -name "R.java" \
            -exec cp {} gradle_build/app/src/main/java/com/pramod/loopmidi/ \;

      - name: Setup Gradle 8.9 wrapper
        working-directory: gradle_build
        run: gradle wrapper --gradle-version=8.9

      - name: Build Debug APK
        working-directory: gradle_build
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pramod-Octapad-Loops-Debug
          path: gradle_build/app/build/outputs/apk/debug/*.apk
          retention-days: 30
