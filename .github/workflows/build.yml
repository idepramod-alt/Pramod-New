          DECL_ANCHOR = '    private native void nativeReinitStream(int nativeSR, int nativeBurst);'
          RECORDING_DECLS = '''
    // ── Multi-track recording JNI ────────────────────────────────────────────
    private native void    nativeStartRecord(int track);
    private native void    nativeStopRecord();
    private native int     nativeGetRecordedFrameCount(int track);
