name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Rewrite root build.gradle
        working-directory: gradle_build
        run: |
          cat > build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.6.0' apply false
              id 'com.google.gms.google-services' version '4.4.2' apply false
          }
          GRADLE

      - name: Rewrite app/build.gradle
        working-directory: gradle_build
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'com.google.gms.google-services'
          }
          android {
              namespace 'com.pramod.loopmidi'
              compileSdk 34
              ndkVersion '25.2.9519653'
              defaultConfig {
                  applicationId 'com.pramod.loopmidi'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
                  ndk { abiFilters 'arm64-v8a', 'armeabi-v7a' }
                  externalNativeBuild { cmake { cppFlags '-std=c++17'; arguments '-DANDROID_STL=c++_shared' } }
              }
              buildTypes {
                  debug { minifyEnabled false }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              externalNativeBuild {
                  cmake {
                      path 'src/main/cpp/CMakeLists.txt'
                      version '3.22.1'
                  }
              }
              buildFeatures {
                  prefab true
              }
              sourceSets {
                  main {
                      jniLibs.srcDirs = ['src/main/jniLibs']
                  }
              }
              packagingOptions {
                  resources {
                      excludes += ['META-INF/DEPENDENCIES','META-INF/LICENSE','META-INF/NOTICE','META-INF/*.kotlin_module','META-INF/*.version','**/*.kotlin_builtins','**/*.kotlin_metadata']
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.documentfile:documentfile:1.1.0'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.legacy:legacy-support-v4:1.0.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.google.firebase:firebase-database:20.3.1'
              implementation 'com.google.firebase:firebase-auth:22.3.1'
              implementation 'com.google.android.gms:play-services-base:18.3.0'
              implementation 'com.google.android.gms:play-services-tasks:18.1.0'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.25'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.oboe:oboe:1.8.1'
          }
          GRADLE

      - name: Rewrite settings.gradle
        working-directory: gradle_build
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'PramodLoopMidi'
          include ':app'
          GRADLE

      - name: Write clean AndroidManifest.xml
        run: |
          cat > gradle_build/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              android:versionCode="1"
              android:versionName="1.0">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-feature android:name="android.hardware.usb.host"/>
              <uses-feature android:name="android.software.midi" android:required="true"/>
              <permission android:name="com.pramod.loopmidi.DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION" android:protectionLevel="signature"/>
              <uses-permission android:name="com.pramod.loopmidi.DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION"/>
              <application
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:label="Pramod Octapad Loops"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="true"
                  android:appComponentFactory="androidx.core.app.CoreComponentFactory">
                  <activity android:name="com.pramod.loopmidi.ActivationActivity" android:exported="true" android:screenOrientation="landscape"/>
                  <activity android:name="com.pramod.loopmidi.LoopsActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name="com.pramod.loopmidi.MainActivity" android:exported="false" android:screenOrientation="landscape"/>
                  <service android:name="com.google.firebase.components.ComponentDiscoveryService" android:exported="false" android:directBootAware="true">
                      <meta-data android:name="com.google.firebase.components:com.google.firebase.database.FirebaseDatabaseKtxRegistrar" android:value="com.google.firebase.components.ComponentRegistrar"/>
                      <meta-data android:name="com.google.firebase.components:com.google.firebase.database.DatabaseRegistrar" android:value="com.google.firebase.components.ComponentRegistrar"/>
                      <meta-data android:name="com.google.firebase.components:com.google.firebase.ktx.FirebaseCommonLegacyRegistrar" android:value="com.google.firebase.components.ComponentRegistrar"/>
                      <meta-data android:name="com.google.firebase.components:com.google.firebase.FirebaseCommonKtxRegistrar" android:value="com.google.firebase.components.ComponentRegistrar"/>
                  </service>
                  <provider android:name="com.google.firebase.provider.FirebaseInitProvider" android:exported="false" android:authorities="com.pramod.loopmidi.firebaseinitprovider" android:initOrder="100" android:directBootAware="true"/>
                  <activity android:theme="@android:style/Theme.Translucent.NoTitleBar" android:name="com.google.android.gms.common.api.GoogleApiActivity" android:exported="false"/>
                  <meta-data android:name="com.google.android.gms.version" android:value="@integer/google_play_services_version"/>
                  <provider android:name="androidx.startup.InitializationProvider" android:exported="false" android:authorities="com.pramod.loopmidi.androidx-startup">
                      <meta-data android:name="androidx.emoji2.text.EmojiCompatInitializer" android:value="androidx.startup"/>
                      <meta-data android:name="androidx.lifecycle.ProcessLifecycleInitializer" android:value="androidx.startup"/>
                      <meta-data android:name="androidx.profileinstaller.ProfileInstallerInitializer" android:value="androidx.startup"/>
                  </provider>
                  <receiver android:name="androidx.profileinstaller.ProfileInstallReceiver" android:permission="android.permission.DUMP" android:enabled="true" android:exported="true" android:directBootAware="false">
                      <intent-filter><action android:name="androidx.profileinstaller.action.INSTALL_PROFILE"/></intent-filter>
                      <intent-filter><action android:name="androidx.profileinstaller.action.SKIP_FILE"/></intent-filter>
                      <intent-filter><action android:name="androidx.profileinstaller.action.SAVE_PROFILE"/></intent-filter>
                      <intent-filter><action android:name="androidx.profileinstaller.action.BENCHMARK_OPERATION"/></intent-filter>
                  </receiver>
              </application>
          </manifest>
          MANIFEST

      - name: Create google-services.json
        working-directory: gradle_build/app
        run: |
          cat > google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "pramod-placeholder",
              "storage_bucket": "pramod-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.pramod.loopmidi" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Remove .dex and binary files
        run: |
          rm -f gradle_build/app/src/main/classes*.dex
          rm -f gradle_build/app/src/main/DebugProbesKt.bin

      - name: Cleanup library resources (keep app drawables)
        run: |
          rm -rf gradle_build/app/src/main/res/color-v31/
          rm -rf gradle_build/app/src/main/res/color-night/
          rm -rf gradle_build/app/src/main/res/layout-land/
          find gradle_build/app/src/main/res -maxdepth 1 -type d \( -name "values" -o -name "values-*" \) -exec rm -rf {} + 2>/dev/null || true
          rm -rf gradle_build/app/src/main/res/anim/
          rm -rf gradle_build/app/src/main/res/animator/
          rm -rf gradle_build/app/src/main/res/interpolator/
          rm -rf gradle_build/app/src/main/res/xml/
          rm -rf gradle_build/app/src/main/res/drawable-watch/
          rm -rf gradle_build/app/src/main/res/layout-watch/
          rm -rf gradle_build/app/src/main/res/layout-v26/
          rm -rf gradle_build/app/src/main/res/drawable-ldrtl-hdpi/
          rm -rf gradle_build/app/src/main/res/drawable-ldrtl-mdpi/
          rm -rf gradle_build/app/src/main/res/drawable-ldrtl-xhdpi/
          rm -rf gradle_build/app/src/main/res/drawable-ldrtl-xxhdpi/
          rm -rf gradle_build/app/src/main/res/drawable-ldrtl-xxxhdpi/
          rm -rf gradle_build/app/src/main/res/drawable-anydpi/
          rm -rf gradle_build/app/src/main/res/drawable-anydpi-v24/
          # NOTE: mipmap-anydpi-v26/ is intentionally kept — it holds the adaptive
          # launcher icon definition (real foreground image + background), which
          # was previously being deleted here and replaced by a solid blue fallback.
          find gradle_build/app/src/main/res/layout -type f \
            ! -name "activity_activation.xml" \
            ! -name "activity_loops.xml" \
            ! -name "custom_dialog.xml" \
            ! -name "main.xml" \
            ! -name "notification_action.xml" \
            ! -name "notification_action_tombstone.xml" \
            ! -name "notification_template_custom_big.xml" \
            ! -name "notification_template_icon_group.xml" \
            ! -name "notification_template_part_chronometer.xml" \
            ! -name "notification_template_part_time.xml" \
            -delete 2>/dev/null || true
          mkdir -p gradle_build/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Pramod Octapad Loops</string>\n</resources>\n' > gradle_build/app/src/main/res/values/strings.xml

      - name: Move native libs to jniLibs
        run: |
          mkdir -p gradle_build/app/src/main/jniLibs
          # Copy only libdatastore_shared_counter.so — liboboe_audio_engine.so is built by CMake
          find gradle_build/app/src/main/lib -name "libdatastore_shared_counter.so" | while read f; do
            abi=$(basename $(dirname "$f"))
            mkdir -p gradle_build/app/src/main/jniLibs/$abi
            cp "$f" gradle_build/app/src/main/jniLibs/$abi/
          done
          rm -rf gradle_build/app/src/main/lib

      - name: Remove binary kotlin metadata and META-INF
        run: |
          rm -rf gradle_build/app/src/main/kotlin
          rm -rf gradle_build/app/src/main/META-INF

      - name: Copy Java sources from decompiled
        run: |
          mkdir -p gradle_build/app/src/main/java/com/pramod/loopmidi
          # Exclude AudioEngine.java and LoopsActivity.java — gradle_build/ already has
          # patched versions with nativeUpdateLoopSpeedPitch / nativePlayLoopSP / playLoopSP /
          # updateLoopSpeedPitch. Copying the decompiled versions would overwrite and lose them.
          find decompiled_apk_jadx/sources/com/pramod/loopmidi -name "*.java" ! -name "R.java" \
            ! -name "AudioEngine.java" ! -name "LoopsActivity.java" \
            -exec cp {} gradle_build/app/src/main/java/com/pramod/loopmidi/ \;

      - name: Create ActivationActivity stub
        run: |
          cat > gradle_build/app/src/main/java/com/pramod/loopmidi/ActivationActivity.java << 'EOF'
          package com.pramod.loopmidi;
          import android.app.Activity;
          import android.os.Bundle;
          public class ActivationActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  finish();
              }
          }
          EOF

      - name: Fix UByte.MAX_VALUE
        run: |
          JAVA_DIR="gradle_build/app/src/main/java/com/pramod/loopmidi"
          sed -i 's/import kotlin\.UByte;//g' $JAVA_DIR/*.java
          sed -i 's/UByte\.MAX_VALUE/255/g' $JAVA_DIR/*.java

      - name: Fix jadx decompilation artifacts (sed)
        run: |
          JAVA_DIR="gradle_build/app/src/main/java/com/pramod/loopmidi"

          # Fix 1: Remove (this) arg from anonymous class constructors
          sed -i 's/\(new [A-Za-z$.]*\)(this) {\( *\/\/ from class:\)/\1() {\2/g' $JAVA_DIR/*.java

          # Fix 2: Remove invalid outer-class self-assignment lines
          sed -i '/this\.this\$0 = this;/d' $JAVA_DIR/*.java
          sed -i '/this\.this\$1 = this;/d' $JAVA_DIR/*.java

          # Fix 3: Remove synthetic AnonymousClassXX field declarations
          sed -i '/final \/\* synthetic \*\/ AnonymousClass[0-9]* this\$[0-9]*;/d' $JAVA_DIR/*.java

          # Fix 4: ConstraintLayout.LayoutParams.Table private constants
          sed -i 's/ConstraintLayout\.LayoutParams\.Table\.[A-Z_]* \/\* \([0-9]*\) \*\//\1/g' $JAVA_DIR/*.java

          # Fix 5: Remove 'private' from fields accessed by inner classes
          sed -i '/\bloopPlaying\b/s/\bprivate\b //' $JAVA_DIR/LoopsActivity.java
          sed -i '/\baudioEngine\b/s/\bprivate\b //' $JAVA_DIR/LoopsActivity.java
          sed -i '/\bloopPads\b/s/\bprivate\b //' $JAVA_DIR/LoopsActivity.java

          # Fix 6: Delete phantom eN = eM; lines (both sides have digits)
          sed -i '/^\s*e[0-9]\+ = e[0-9]\+;$/d' $JAVA_DIR/*.java

          # Fix 7: Replace nested outer-class reference chain (dotted or bare usage)
          sed -i 's/this\.this\$1\.this\$0\b/LoopsActivity.this/g' $JAVA_DIR/LoopsActivity.java
          sed -i 's/this\.this\$1\.this\$0\b/MainActivity.this/g' $JAVA_DIR/MainActivity.java

          # Fix 8: Replace single-level outer-class reference usage with OuterClass.this (dotted or bare usage)
          sed -i 's/this\.this\$0\b/LoopsActivity.this/g' $JAVA_DIR/LoopsActivity.java
          sed -i 's/this\.this\$0\b/MainActivity.this/g' $JAVA_DIR/MainActivity.java

          # Fix 9: Remove now-unused synthetic this$0 field declarations (any outer class name)
          sed -i '/final \/\* synthetic \*\/ [A-Za-z0-9_]* this\$0;/d' $JAVA_DIR/*.java

          echo "=== Sed fixes done ==="

      - name: Fix jadx exception variable scoping (Python)
        run: |
          python3 << 'PYEOF'
          import re, os

          JAVA_DIR = 'gradle_build/app/src/main/java/com/pramod/loopmidi'

          loops_path = os.path.join(JAVA_DIR, 'LoopsActivity.java')
          with open(loops_path) as f:
              lines = f.readlines()

          result = []
          already_hoisted = set()
          for line in lines:
              m = re.match(r'^(\s+)(e\d+) = e;', line)
              if m:
                  indent, var = m.group(1), m.group(2)
                  result.append(line)
                  if var not in already_hoisted:
                      for j in range(len(result) - 1, -1, -1):
                          if re.search(r'\btry\s*\{', result[j]):
                              result.insert(j, f'{indent}Exception {var} = null;\n')
                              break
                      already_hoisted.add(var)
              else:
                  result.append(line)

          with open(loops_path, 'w') as f:
              f.writelines(result)
          print(f'LoopsActivity.java: hoisted declarations for: {already_hoisted or "none"}')

          main_path = os.path.join(JAVA_DIR, 'MainActivity.java')
          with open(main_path) as f:
              lines = f.readlines()

          result = []
          fixed_decl = 0
          fixed_orphan = 0
          for line in lines:
              m = re.match(r'^(\s+)e = (e\d+);', line)
              if m:
                  result.append(f'{m.group(1)}Exception e = {m.group(2)};\n')
                  fixed_decl += 1
                  continue

              m2 = re.match(r'^(\s+)(e\d+)\.printStackTrace\(\);\s*$', line)
              if m2:
                  result.append(f'{m2.group(1)}// {line.strip()} // jadx-out-of-scope\n')
                  fixed_orphan += 1
                  continue

              result.append(line)

          with open(main_path, 'w') as f:
              f.writelines(result)
          print(f'MainActivity.java: declared {fixed_decl} bare-e var(s), commented {fixed_orphan} orphaned printStackTrace()')

          print('All exception variable fixes applied.')
          PYEOF

      - name: Verify loadLoopFromFolder is clean (no jadx e4/e5 scoping issues)
        run: |
          JAVA='gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java'
          # The method was rewritten cleanly in the repo — verify it is present
          grep -q 'DocumentFile loopFolder = null;' "$JAVA" \
            && echo 'OK: loadLoopFromFolder uses clean DocumentFile loopFolder = null' \
            || { echo 'FAIL: broken jadx loadLoopFromFolder still present'; exit 1; }
          # Verify no unscoped e4/e5 references remain
          ! grep -q 'e4 = e;|e4 = e[0-9]' "$JAVA" \
            && echo 'OK: no broken e4 variable references' \
            || { echo 'FAIL: broken e4 references found in LoopsActivity'; exit 1; }

      - name: Patch audio_engine.cpp - independent speed/pitch (OLA granular synthesis)
        run: |
            python3 - << 'PYEOF'
            import sys
            CPP = 'gradle_build/app/src/main/cpp/audio_engine.cpp'
            with open(CPP) as f:
                src = f.read()
            required = ['CMD_UPDATE_SPEED_PITCH', 'SYN_HOP', 'updateLoopSpeedPitch',
                        'playLoopSP', 'nativeUpdateLoopSpeedPitch', 'nativePlayLoopSP',
                        'grainStartA', 'grainStartB', 'synPhase']
            missing = [s for s in required if s not in src]
            if missing:
                print('MISSING symbols: ' + str(missing))
                sys.exit(1)
            print('audio_engine.cpp: all ' + str(len(required)) + ' required symbols verified OK')
            PYEOF

      - name: Patch AudioEngine.java - add independent speed/pitch native methods
        run: |
            python3 - << 'PYEOF'
            import sys
            JAVA = 'gradle_build/app/src/main/java/com/pramod/loopmidi/AudioEngine.java'
            with open(JAVA) as f:
                src = f.read()
            required = ['nativeUpdateLoopSpeedPitch', 'nativePlayLoopSP', 'playLoopSP', 'updateLoopSpeedPitch']
            missing = [s for s in required if s not in src]
            if missing:
                print('MISSING in AudioEngine.java: ' + str(missing))
                sys.exit(1)
            print('AudioEngine.java: all ' + str(len(required)) + ' required symbols verified OK')
            PYEOF

      - name: Patch LoopsActivity.java - use independent speed/pitch calls
        run: |
            python3 - << 'PYEOF'
            import sys
            JAVA = 'gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java'
            with open(JAVA) as f:
                src = f.read()
            required = ['playLoopSP', 'updateLoopSpeedPitch']
            missing = [s for s in required if s not in src]
            if missing:
                print('MISSING in LoopsActivity.java: ' + str(missing))
                sys.exit(1)
            print('LoopsActivity.java: all ' + str(len(required)) + ' required symbols verified OK')
            PYEOF

      - name: Verify speed/pitch patch symbols in all files
        run: |
          echo "=== Checking audio_engine.cpp ==="
          for sym in CMD_UPDATE_SPEED_PITCH SYN_HOP updateLoopSpeedPitch playLoopSP grainStartA synPhase nativeUpdateLoopSpeedPitch nativePlayLoopSP; do
            grep -q "$sym" gradle_build/app/src/main/cpp/audio_engine.cpp \
              && echo "  OK: $sym" || { echo "  MISSING: $sym"; exit 1; }
          done
          echo "=== Checking AudioEngine.java ==="
          for sym in nativeUpdateLoopSpeedPitch nativePlayLoopSP playLoopSP updateLoopSpeedPitch; do
            grep -q "$sym" gradle_build/app/src/main/java/com/pramod/loopmidi/AudioEngine.java \
              && echo "  OK: $sym" || { echo "  MISSING: $sym"; exit 1; }
          done
          echo "=== Checking LoopsActivity.java ==="
          grep -q "playLoopSP" gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java \
            && echo "  OK: playLoopSP" || { echo "  MISSING: playLoopSP"; exit 1; }
          grep -q "updateLoopSpeedPitch" gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java \
            && echo "  OK: updateLoopSpeedPitch" || { echo "  MISSING: updateLoopSpeedPitch"; exit 1; }
          # Ensure no old coupled multiplication calls remain
          ! grep -q "currentSpeed \* this\.currentPitch" gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java \
            && echo "  OK: no stale speed*pitch multiplication" || { echo "  FAIL: old speed*pitch call still present"; exit 1; }
          echo "=== All patch verifications passed ==="

      - name: Create mipmap launcher icons
        run: |
          pip3 install --quiet --disable-pip-version-check Pillow
          python3 - << 'PYEOF'
          import os
          from PIL import Image, ImageDraw

          SRC = 'app_icon_source.png'
          base = 'gradle_build/app/src/main/res'

          # Standard Android mipmap sizes
          sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          src_img = Image.open(SRC).convert('RGBA')
          # Center-crop to a square so it isn't stretched
          w, h = src_img.size
          side = min(w, h)
          left, top = (w - side) // 2, (h - side) // 2
          src_img = src_img.crop((left, top, left + side, top + side))

          for folder, px in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)

              square = src_img.resize((px, px), Image.LANCZOS)
              square.save(os.path.join(path, 'ic_launcher.png'))

              # Circular mask for legacy round-icon variant (pre-Android 8 devices)
              mask = Image.new('L', (px, px), 0)
              ImageDraw.Draw(mask).ellipse((0, 0, px, px), fill=255)
              round_icon = Image.new('RGBA', (px, px), (0, 0, 0, 0))
              round_icon.paste(square, (0, 0), mask)
              round_icon.save(os.path.join(path, 'ic_launcher_round.png'))

              print(f'Created {folder}/ic_launcher.png + ic_launcher_round.png ({px}px) from real icon')

          print('All mipmap icons created from app_icon_source.png.')
          PYEOF

      - name: Setup Gradle 8.9 wrapper
        working-directory: gradle_build
        run: gradle wrapper --gradle-version=8.9

      - name: Build Debug APK
        working-directory: gradle_build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log

      - name: Show build errors
        if: always()
        run: |
          if [ -f /tmp/build.log ]; then
            echo "===== Last 200 lines of build log ====="
            tail -n 200 /tmp/build.log
          else
            echo "No build log found."
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: gradle_build/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
