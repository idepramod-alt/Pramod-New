    }''')

src = replace_method(src, '    public void stopMicRecording() {', '''\
    /** Stop the engine-level recording. */
    public void stopMicRecording() {
        if (!this.isRecording || this.audioEngine == null) return;
        this.audioEngine.stopRecording();
        this.isRecording = false;
        int frames = this.audioEngine.getRecordedFrameCount(this.activeRecTrack);
        if (frames > 0) {
            this.trackHasData[this.activeRecTrack] = true;
            this.hasRecording = true;
            float secs = frames / 44100.0f;
            if (this.btnRecordStart != null) {
                this.btnRecordStart.setBackgroundColor(0xFFCC0000);
                this.btnRecordStart.setText("\uD83D\uDD34 REC");
            }
            if (this.txtRecStatus != null)
                this.txtRecStatus.setText("\u2705 T" + (this.activeRecTrack + 1) + " " +
                    String.format("%.1f", secs) + "s saved \u2014 tap \u25B6 PLAY");
            for (int i = 1; i <= 4; i++) {
                int next = (this.activeRecTrack + i) % 4;
                if (!this.trackHasData[next]) { this.activeRecTrack = next; break; }
            }
        } else {
            if (this.txtRecStatus != null) this.txtRecStatus.setText("Empty \u2014 tap \uD83D\uDD34 REC");
            if (this.btnRecordStart != null) this.btnRecordStart.setText("\uD83D\uDD34 REC");
