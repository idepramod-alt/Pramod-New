def replace_method(src, sig, new_body):
    m = re.search(re.escape(sig), src)
    if not m:
        print('WARN: not found: ' + sig[:60])
        return src
    start = m.start()
    depth = 0
    i = src.index('{', start)
    while i < len(src):
        if src[i] == '{': depth += 1
        elif src[i] == '}':
            depth -= 1
            if depth == 0:
                end = i + 1
                break
        i += 1
    src = src[:start] + new_body + '\n' + src[end:]
    print('OK replaced: ' + sig[:60])
    return src

