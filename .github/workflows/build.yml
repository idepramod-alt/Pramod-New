    /** Play the most-recently recorded engine track. */
    public void playRecording() {
        if (this.audioEngine == null) return;
        if (!this.hasRecording) {
            Toast.makeText(this, "No recording \u2014 tap \uD83D\uDD34 REC first!", Toast.LENGTH_SHORT).show(); return;
        }
        if (this.isRecording) {
            Toast.makeText(this, "Stop recording first!", Toast.LENGTH_SHORT).show(); return;
        }
        for (int i = 0; i < 4; i++) {
            if (this.trackPlaying[i]) { this.audioEngine.stopTrackPlayback(i); this.trackPlaying[i] = false; }
