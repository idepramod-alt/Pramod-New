    // ═══════════════════════════════════════════════════════════════════════════
    // Multi-track recorder — Java wrappers over native recording JNI
    // ═══════════════════════════════════════════════════════════════════════════

    public static final int REC_TRACKS = 4;

    /** Start recording mixed output into the given track slot (0-3). */
    public void startRecording(int track) {
        if (!nativeAvailable || track < 0 || track >= REC_TRACKS) return;
        try { nativeStartRecord(track); }
        catch (UnsatisfiedLinkError e) { Log.e(TAG, "nativeStartRecord missing", e); }
    }

    /** Stop the active recording. */
    public void stopRecording() {
        if (!nativeAvailable) return;
        try { nativeStopRecord(); }
        catch (UnsatisfiedLinkError e) { Log.e(TAG, "nativeStopRecord missing", e); }
    }

    /** Number of PCM frames captured in the given track (0 if nothing recorded). */
    public int getRecordedFrameCount(int track) {
        if (!nativeAvailable || track < 0 || track >= REC_TRACKS) return 0;
        try { return nativeGetRecordedFrameCount(track); }
        catch (UnsatisfiedLinkError e) { return 0; }
    }

    /** Start playing back a recorded track. looping=true repeats infinitely. */
    public void startTrackPlayback(int track, float vol, boolean looping) {
        if (!nativeAvailable || track < 0 || track >= REC_TRACKS) return;
        try { nativeStartTrackPlayback(track, vol, looping); }
        catch (UnsatisfiedLinkError e) { Log.e(TAG, "nativeStartTrackPlayback missing", e); }
    }

    /** Stop playback of the given track. */
    public void stopTrackPlayback(int track) {
        if (!nativeAvailable || track < 0 || track >= REC_TRACKS) return;
        try { nativeStopTrackPlayback(track); }
        catch (UnsatisfiedLinkError e) { Log.e(TAG, "nativeStopTrackPlayback missing", e); }
    }

    /**
     * Export a recorded track to a WAV file at the given path.
     * Returns the number of frames written, or -1 on failure.
     */
    public int saveTrackToWav(int track, String filePath) {
        if (!nativeAvailable) return -1;
        int frameCount;
        float[] samples;
        try {
            frameCount = nativeGetRecordedFrameCount(track);
            if (frameCount <= 0) return 0;
            samples = nativeGetRecordedSamples(track);
        } catch (UnsatisfiedLinkError e) { return -1; }
        if (samples == null || samples.length == 0) return -1;
        try {
            short[] pcm = new short[samples.length];
            for (int i = 0; i < samples.length; i++)
                pcm[i] = (short)(Math.max(-1f, Math.min(1f, samples[i])) * 32767f);
            writeWavFile(filePath, pcm, targetSampleRate, 1);
            Log.i(TAG, "Saved track " + track + " → " + filePath + " (" + frameCount + " frames)");
            return frameCount;
        } catch (Exception e) {
            Log.e(TAG, "saveTrackToWav failed: " + e.getMessage(), e);
            return -1;
        }
    }

    // ── WAV file writer ────────────────────────────────────────────────────────
    private void writeWavFile(String path, short[] pcm, int sr, int channels) throws java.io.IOException {
        int dataLen = pcm.length * 2;
        java.io.FileOutputStream fos = new java.io.FileOutputStream(path);
        java.io.DataOutputStream dos = new java.io.DataOutputStream(
                new java.io.BufferedOutputStream(fos));
        // RIFF header
        dos.writeBytes("RIFF");
        writeLittleInt(dos, 36 + dataLen);
        dos.writeBytes("WAVE");
        // fmt chunk
        dos.writeBytes("fmt ");
        writeLittleInt(dos, 16);
        writeLittleShort(dos, (short) 1);          // PCM
        writeLittleShort(dos, (short) channels);
        writeLittleInt(dos, sr);
        writeLittleInt(dos, sr * channels * 2);    // byte rate
        writeLittleShort(dos, (short)(channels * 2)); // block align
        writeLittleShort(dos, (short) 16);         // bits per sample
        // data chunk
        dos.writeBytes("data");
        writeLittleInt(dos, dataLen);
        for (short s : pcm) writeLittleShort(dos, s);
        dos.close();
    }

    private static void writeLittleInt(java.io.DataOutputStream d, int v) throws java.io.IOException {
        d.write(v & 0xFF); d.write((v >> 8) & 0xFF);
        d.write((v >> 16) & 0xFF); d.write((v >> 24) & 0xFF);
    }
    private static void writeLittleShort(java.io.DataOutputStream d, short v) throws java.io.IOException {
        d.write(v & 0xFF); d.write((v >> 8) & 0xFF);
    }
'''
