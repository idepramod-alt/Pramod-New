        for (int i = 3; i >= 0; i--) { if (this.trackHasData[i]) { playTrack = i; break; } }
        this.audioEngine.startTrackPlayback(playTrack, 1.0f, false);
        this.trackPlaying[playTrack] = true;
        if (this.btnPlayRecording != null) this.btnPlayRecording.setText("\u25B6 T" + (playTrack + 1));
        if (this.txtRecStatus != null)
            this.txtRecStatus.setText("\u25B6 Playing Track " + (playTrack + 1) + "...");
    }''')

