      - name: Verify all feature patches
        run: |
          CPP="gradle_build/app/src/main/cpp/audio_engine.cpp"
          AE="gradle_build/app/src/main/java/com/pramod/loopmidi/AudioEngine.java"
          LA="gradle_build/app/src/main/java/com/pramod/loopmidi/LoopsActivity.java"
          XML="gradle_build/app/src/main/res/layout/activity_loops.xml"
          echo "=== Drum rolling fix (chokeGroup=0) ==="
          grep -n 'chokeGroup' "$LA" | head -2 || echo "not found"
          echo "=== Latency (AAudio) ==="
          grep -n 'setAudioApi' "$CPP" | head -2 || echo "not found"
          echo "=== C++ recording symbols ==="
          for s in CMD_REC_START recActiveTrack nativeStartRecord; do
            echo "  $s: $(grep -c $s $CPP || echo 0) occurrences"
          done
          echo "=== AudioEngine.java ==="
          grep -c 'startRecording' "$AE" || echo 0
          echo "=== LoopsActivity.java ==="
          grep -c 'btnRecordStart' "$LA" || echo 0
          echo "=== activity_loops.xml ==="
          grep -c 'btnRecordStart' "$XML" || echo 0
          echo "All feature verifications done"

      - name: Build Debug APK
        working-directory: gradle_build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log

      - name: Show build errors
        if: always()
        run: |
          if [ -f /tmp/build.log ]; then
            echo "===== Last 200 lines of build log ====="
            tail -n 200 /tmp/build.log
          else
            echo "No build log found."
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: gradle_build/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
