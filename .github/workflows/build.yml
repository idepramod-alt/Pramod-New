    /** Record the engine's own mixed output — NOT the microphone. */
    public void startMicRecording() {
        if (this.audioEngine == null) {
            Toast.makeText(this, "Audio engine not ready", Toast.LENGTH_SHORT).show(); return;
        }
        if (this.isRecording) { this.audioEngine.stopRecording(); this.isRecording = false; }
        int t = this.activeRecTrack;
        for (int i = 0; i < 4; i++) { if (!this.trackHasData[i]) { t = i; break; } }
        this.activeRecTrack = t;
        this.audioEngine.startRecording(this.activeRecTrack);
        this.isRecording = true;
        this.hasRecording = false;
        if (this.btnRecordStart != null) {
            this.btnRecordStart.setBackgroundColor(0xFFFF0000);
