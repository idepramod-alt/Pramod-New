      - name: Clean stale committed build artifacts
        run: |
          # The repo ships pre-committed build outputs:
          #   - R.java (stale, missing IDs added in recent commits)
          #   - .gradle/ task-history cache (causes processDebugResources to be
          #     skipped as UP-TO-DATE, so R class is never regenerated)
          #   - app/build/ (intermediates, generated, outputs from prior builds)
          #   - build/ (root project build cache)
          # Gradle sees these and marks :app:processDebugResources UP-TO-DATE,
          # skipping AAPT — so any new layout ID is missing from R, causing
          # "cannot find symbol" compilation errors.
          # Full removal forces a clean, reproducible resource-processing pass.
          rm -f  gradle_build/app/src/main/java/com/pramod/loopmidi/R.java
          rm -rf gradle_build/.gradle
          rm -rf gradle_build/app/build
          rm -rf gradle_build/build
          # Verify stale artifacts are gone
          [ ! -f gradle_build/app/src/main/java/com/pramod/loopmidi/R.java ] \
            && echo "OK: stale R.java removed" \
            || { echo "FAIL: R.java still present"; exit 1; }
          [ ! -d gradle_build/.gradle ] \
            && echo "OK: .gradle cache removed" \
            || { echo "FAIL: .gradle still present"; exit 1; }
          [ ! -d gradle_build/app/build ] \
