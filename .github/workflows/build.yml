name: Build Pramod Sound Studio APK

on:
  push:
    branches: [ main ]
    paths:
      - 'sound-recorder/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 (required for AGP 8.x) ─────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK (compileSdk 35) ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ── 4. Gradle Wrapper (project has no bundled gradlew) ─────────────────
      - name: Create Gradle wrapper (8.9)
        working-directory: sound-recorder
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type all
          chmod +x gradlew

      # ── 5. Cache Gradle files ──────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('sound-recorder/**/*.gradle*', 'sound-recorder/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: sound-recorder
        run: |
          set -o pipefail
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee /tmp/build_debug.log

      # ── 7. Build Release APK (unsigned) ───────────────────────────────────
      - name: Build Release APK (unsigned)
        working-directory: sound-recorder
        run: |
          set -o pipefail
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            2>&1 | tee /tmp/build_release.log

      # ── 8. Show logs on failure ────────────────────────────────────────────
      - name: Show build log on failure
        if: failure()
        run: |
          echo "===== DEBUG BUILD LOG (last 300 lines) ====="
          tail -n 300 /tmp/build_debug.log 2>/dev/null || true
          echo "===== RELEASE BUILD LOG (last 100 lines) ====="
          tail -n 100 /tmp/build_release.log 2>/dev/null || true

      # ── 9. Rename APKs with version + commit SHA ──────────────────────────
      - name: Rename APK files
        if: success()
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          DEBUG_SRC="sound-recorder/app/build/outputs/apk/debug/app-debug.apk"
          REL_SRC="sound-recorder/app/build/outputs/apk/release/app-release-unsigned.apk"
          mkdir -p artifacts
          [ -f "$DEBUG_SRC"   ] && cp "$DEBUG_SRC"   "artifacts/PramodSoundStudio-v2.0.0-debug-${SHORT}.apk"
          [ -f "$REL_SRC"     ] && cp "$REL_SRC"     "artifacts/PramodSoundStudio-v2.0.0-release-unsigned-${SHORT}.apk"
          echo "=== Built APKs ==="
          ls -lh artifacts/

      # ── 10. Upload Debug APK ───────────────────────────────────────────────
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PramodSoundStudio-Debug-APK
          path: artifacts/PramodSoundStudio-v2.0.0-debug-*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 11. Upload Release APK (unsigned) ─────────────────────────────────
      - name: Upload Release APK (unsigned)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PramodSoundStudio-Release-Unsigned-APK
          path: artifacts/PramodSoundStudio-v2.0.0-release-unsigned-*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Build summary ──────────────────────────────────────────────────
      - name: Print build summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            [ -f "$f" ] && echo "| \`$(basename $f)\` | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
