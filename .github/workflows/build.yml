              print('OK: recording wiring added to onCreate')

          # ── 4. Add recording methods before the final closing brace ───────────
          RECORDING_METHODS = '''
    // ═══════════════════════════════════════════════════════════════════════════
    // Multi-track recording UI handlers
    // ═══════════════════════════════════════════════════════════════════════════

    private void onRecordStartClick() {
        if (this.audioEngine == null) {
            Toast.makeText(this, "Audio engine not ready", Toast.LENGTH_SHORT).show();
            return;
        }
        if (this.isRecording) {
            // Switch to next track
            this.audioEngine.stopRecording();
            this.isRecording = false;
        }
        // Find first empty track, or cycle over activeRecTrack
        this.trackHasData[this.activeRecTrack] = false;
        this.audioEngine.startRecording(this.activeRecTrack);
        this.isRecording = true;
        updateRecUI();
        if (this.txtRecStatus != null) {
            this.txtRecStatus.setText("● REC T" + (this.activeRecTrack + 1));
        }
    }

    private void onRecordStopClick() {
        if (this.audioEngine == null) return;
        if (this.isRecording) {
            this.audioEngine.stopRecording();
            this.isRecording = false;
            int fc = this.audioEngine.getRecordedFrameCount(this.activeRecTrack);
            if (fc > 0) {
                this.trackHasData[this.activeRecTrack] = true;
                float secs = fc / (float) this.audioEngine.getSampleRate();
                if (this.txtRecStatus != null) {
                    this.txtRecStatus.setText("T" + (this.activeRecTrack + 1) + " " +
                            String.format("%.1f", secs) + "s saved");
                }
                // Auto-advance to next empty track slot
                for (int i = 1; i <= REC_TRACKS; i++) {
                    int next = (this.activeRecTrack + i) % REC_TRACKS;
                    if (!this.trackHasData[next]) { this.activeRecTrack = next; break; }
                }
            } else {
                if (this.txtRecStatus != null) this.txtRecStatus.setText("Stopped (empty)");
            }
        }
        // Stop all track playbacks too
        for (int i = 0; i < REC_TRACKS; i++) {
            if (this.trackPlaying[i] && this.audioEngine != null) {
                this.audioEngine.stopTrackPlayback(i);
                this.trackPlaying[i] = false;
            }
        }
        updateRecUI();
    }

    private void onPlayTrackClick(int track) {
        if (this.audioEngine == null) return;
        if (!this.trackHasData[track]) {
            Toast.makeText(this, "T" + (track+1) + ": nothing recorded yet", Toast.LENGTH_SHORT).show();
            return;
        }
        if (this.trackPlaying[track]) {
            this.audioEngine.stopTrackPlayback(track);
            this.trackPlaying[track] = false;
            if (this.btnTrackPlay[track] != null)
                this.btnTrackPlay[track].setText("▶ T" + (track + 1));
        } else {
            this.audioEngine.startTrackPlayback(track, 1.0f, false);
            this.trackPlaying[track] = true;
            if (this.btnTrackPlay[track] != null)
                this.btnTrackPlay[track].setText("■ T" + (track + 1));
        }
    }

    private void onSaveRecordingClick() {
        if (this.audioEngine == null) return;
        // Find a track with data
        int saveTrack = -1;
        for (int i = 0; i < REC_TRACKS; i++) {
            if (this.trackHasData[i]) { saveTrack = i; break; }
        }
        if (saveTrack < 0) {
            Toast.makeText(this, "No recording to save!", Toast.LENGTH_SHORT).show();
            return;
        }
        if (android.os.Build.VERSION.SDK_INT >= 23 &&
                checkSelfPermission(Manifest.permission.WRITE_EXTERNAL_STORAGE)
                        != PackageManager.PERMISSION_GRANTED) {
            requestPermissions(new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE}, 9001);
            return;
        }
        final int track = saveTrack;
        new Thread(() -> {
            try {
                File dir = new File(Environment.getExternalStoragePublicDirectory(
                        Environment.DIRECTORY_MUSIC), "OctapadLoops");
                if (!dir.exists()) dir.mkdirs();
                String fname = "recording_T" + (track + 1) + "_" + System.currentTimeMillis() + ".wav";
                File out = new File(dir, fname);
                int frames = this.audioEngine.saveTrackToWav(track, out.getAbsolutePath());
                MediaScannerConnection.scanFile(this, new String[]{out.getAbsolutePath()},
                        new String[]{"audio/wav"}, null);
                runOnUiThread(() -> Toast.makeText(this,
                        frames > 0 ? "Saved: " + fname : "Save failed!", Toast.LENGTH_LONG).show());
            } catch (Exception e) {
                runOnUiThread(() -> Toast.makeText(this, "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show());
            }
        }).start();
    }

    private void updateRecUI() {
        if (this.btnRecordStart != null)
            this.btnRecordStart.setBackgroundResource(
                    this.isRecording ? R.drawable.btn_3d_orange : R.drawable.btn_3d_dark);
        if (this.btnRecordStop != null)
            this.btnRecordStop.setEnabled(!this.isRecording ||
                    this.audioEngine != null);
        for (int i = 0; i < REC_TRACKS; i++) {
            if (this.btnTrackPlay[i] != null) {
                this.btnTrackPlay[i].setEnabled(this.trackHasData[i]);
                this.btnTrackPlay[i].setAlpha(this.trackHasData[i] ? 1.0f : 0.4f);
            }
        }
    }
'''
          last_brace = src.rfind('\n}')
          if 'onRecordStartClick' not in src:
